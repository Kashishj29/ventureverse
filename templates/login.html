<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VentureVerse | Login</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}?v=2">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=2">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="logo">V</div>
        <div>
          <div class="brand-name">VentureVerse</div>
          <div class="brand-tag">Pre-launch indicators &rarr; success probability</div>
        </div>
      </div>
      <div class="nav-links">
        <a class="pill active" href="{{ url_for('login') }}">Login</a>
        <a class="pill" href="{{ url_for('signup') }}">Sign Up</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="auth-wrapper animate-in">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to access your prediction dashboard</p>
        </div>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
          <div class="field">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
          </div>

          <button class="btn" type="submit" style="margin-top: 8px;">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="{{ url_for('signup') }}">Create one</a>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
